<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek · 流式暗夜助手</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: #0B0E14;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #EFF3F8;
            overflow: hidden;
            height: 100vh;
        }

        /* 主容器 */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #0F1219;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 顶部栏 */
        .header {
            background: #151A24;
            backdrop-filter: blur(10px);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #252A34;
            flex-shrink: 0;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #B9C7D9;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .menu-btn:active {
            background: #252A34;
        }
        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 500;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #C0E0FF, #A87BFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-right {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #B9C7D9;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
        }

        /* 侧边栏抽屉 */
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 280px;
            background: rgba(20, 25, 35, 0.96);
            backdrop-filter: blur(20px);
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 1000;
            border-right: 1px solid #2C3140;
            display: flex;
            flex-direction: column;
            padding: 60px 20px 30px;
            gap: 24px;
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .drawer-overlay.show {
            display: block;
        }
        .drawer button {
            background: #252B36;
            border: none;
            color: white;
            padding: 14px 18px;
            border-radius: 28px;
            font-size: 1rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .drawer button:active {
            background: #3A4150;
        }
        .drawer span {
            font-size: 1.2rem;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            line-height: 1.45;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        .user-message .bubble {
            background: #2B3240;
            color: #F0F4FA;
            border-bottom-right-radius: 6px;
        }
        .assistant-message .bubble {
            background: #1A202C;
            border: 1px solid #2D3442;
            color: #E2E8F0;
            border-bottom-left-radius: 6px;
        }
        /* 消息底部工具栏 */
        .message-footer {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            margin-left: 10px;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .action-btn {
            background: none;
            border: none;
            color: #8F9BB2;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
        }
        .think-time {
            font-size: 0.65rem;
            color: #6A7A96;
            margin-left: 12px;
        }

        /* 流式输出中的光标闪烁 */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #A87BFF;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 输入区域 */
        .input-container {
            background: #151A24;
            border-top: 1px solid #252A34;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-container input {
            flex: 1;
            background: #0F1219;
            border: 1px solid #2D3442;
            border-radius: 32px;
            padding: 12px 18px;
            color: #EFF3F8;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .input-container input:focus {
            border-color: #7A6BFF;
        }
        .input-container button {
            background: #3E4A6B;
            border: none;
            border-radius: 32px;
            padding: 10px 22px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .input-container button:active {
            transform: scale(0.96);
            background: #2E3A55;
        }

        /* 加载思考动画 */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #A0AED0;
        }
        .dot-flashing {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #A87BFF;
            box-shadow: 12px 0 0 #A87BFF, 24px 0 0 #A87BFF;
            animation: dotPulse 1s infinite ease-in-out;
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }

        /* 滚动条 */
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: #1A1F2A; }
        .chat-area::-webkit-scrollbar-thumb { background: #3E4A6B; border-radius: 10px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="menu-btn" id="menuBtn">☰</button>
        <h1>🌙 流式 · 暗夜助手</h1>
        <div class="header-right">
            <button class="icon-btn" id="clearChatHeaderBtn" title="清空对话">🗑️</button>
        </div>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message assistant-message">
            <div class="bubble">✨ 欢迎！点击左上角菜单可清空对话或重设Key。<br>我会一个字一个字地回复，就像真人聊天一样～</div>
        </div>
    </div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
</div>

<!-- 侧边栏抽屉 -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
    <button id="drawerClearChat"><span>🗑️</span> 清空对话</button>
    <button id="drawerSettings"><span>🔑</span> 设置 API Key</button>
    <button id="drawerAbout"><span>ℹ️</span> 关于</button>
</div>

<!-- API Key 模态框 -->
<div id="apiModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); align-items:center; justify-content:center; z-index:1100;">
    <div style="background:#1E2532; border-radius:32px; padding:28px 24px; width:85%; max-width:360px; text-align:center; border:1px solid #3E4A6B;">
        <h3 style="margin:0 0 8px;">🔐 设置 API Key</h3>
        <p style="font-size:0.8rem; color:#A0AED0;">只保存在你的手机中，不会上传</p>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx" style="width:100%; padding:12px; border-radius:40px; border:1px solid #3E4A6B; background:#0F1219; color:white; margin-bottom:20px;">
        <button id="saveKeyBtn" style="background:#5F6F9E; border:none; padding:12px; border-radius:40px; width:100%; color:white; font-weight:bold;">保存并开始</button>
    </div>
</div>

<script>
    // ---------- 配置 ----------
    const STORAGE_KEY = 'deepseek_api_key';
    const MODEL = 'deepseek-v4-flash';
    const API_URL = 'https://api.deepseek.com/chat/completions';

    let currentApiKey = null;
    let messagesHistory = [];      // 存储 { role, content }
    let activeStreamReply = null;   // 当前正在流式输出的消息ID

    // DOM 元素
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const menuBtn = document.getElementById('menuBtn');
    const drawer = document.getElementById('drawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerClearChat = document.getElementById('drawerClearChat');
    const drawerSettings = document.getElementById('drawerSettings');
    const drawerAbout = document.getElementById('drawerAbout');
    const clearChatHeaderBtn = document.getElementById('clearChatHeaderBtn');
    const apiModal = document.getElementById('apiModal');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');

    // 辅助函数
    function enableInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
    }

    function loadStoredKey() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored && stored.startsWith('sk-')) {
            currentApiKey = stored;
            enableInput(true);
        } else {
            currentApiKey = null;
            enableInput(false);
            setTimeout(() => {
                if (!localStorage.getItem(STORAGE_KEY)) apiModal.style.display = 'flex';
            }, 300);
        }
    }

    function saveApiKeyAndClose(key) {
        if (key && key.trim().startsWith('sk-')) {
            localStorage.setItem(STORAGE_KEY, key.trim());
            currentApiKey = key.trim();
            enableInput(true);
            apiModal.style.display = 'none';
            addSystemMessage("✅ API Key 已保存，现在可以开始聊天了。");
        } else {
            alert("请输入有效的 Key (以 sk- 开头)");
        }
    }

    function addSystemMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', 'assistant-message');
        msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addUserMessageToUI(content, msgId) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', 'user-message');
        msgDiv.setAttribute('data-id', msgId);
        msgDiv.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>
            <div class="message-footer"><button class="action-btn edit-btn" data-id="${msgId}">✏️ 编辑</button></div>`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return msgDiv;
    }

    function addAssistantPlaceholder(msgId) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', 'assistant-message');
        msgDiv.setAttribute('data-id', msgId);
        msgDiv.innerHTML = `<div class="bubble"><span class="stream-text"></span><span class="typing-cursor"></span></div>
            <div class="message-footer"><button class="action-btn regenerate-btn" data-id="${msgId}">🔄 重新生成</button>
            <span class="think-time" id="thinkTime-${msgId}"></span></div>`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return msgDiv;
    }

    function updateAssistantText(msgId, newText, finished = false, thinkTimeMs = null) {
        const msgDiv = document.querySelector(`.assistant-message[data-id="${msgId}"]`);
        if (!msgDiv) return;
        const bubble = msgDiv.querySelector('.bubble');
        const textSpan = bubble.querySelector('.stream-text');
        const cursorSpan = bubble.querySelector('.typing-cursor');
        if (textSpan) textSpan.innerHTML = escapeHtml(newText);
        if (finished && cursorSpan) cursorSpan.remove();
        if (thinkTimeMs !== null) {
            const timeSpan = msgDiv.querySelector('.think-time');
            if (timeSpan) timeSpan.innerText = `⏱️ 思考耗时: ${thinkTimeMs}ms`;
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 流式调用 API
    async function streamDeepSeek(userMessage, assistantMsgId, startTime) {
        const messagesForApi = [...messagesHistory, { role: 'user', content: userMessage }];
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentApiKey}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messagesForApi,
                    stream: true
                })
            });
            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errMsg = errData.error?.message || errMsg;
                } catch(e) {}
                throw new Error(errMsg);
            }
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = "";
            let firstChunk = true;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                if (firstChunk) {
                                    // 收到第一个字符，移除全局的“思考中”指示（如果有单独做的话，这里实际上没有额外loading，因为我们在调用前显示了光标配流式占位）
                                    firstChunk = false;
                                }
                                fullContent += delta;
                                updateAssistantText(assistantMsgId, fullContent, false);
                            }
                        } catch(e) {}
                    }
                }
            }
            const endTime = performance.now();
            const elapsedMs = Math.round(endTime - startTime);
            updateAssistantText(assistantMsgId, fullContent, true, elapsedMs);
            // 保存到历史
            messagesHistory.push({ role: 'user', content: userMessage });
            messagesHistory.push({ role: 'assistant', content: fullContent });
        } catch (error) {
            console.error(error);
            let errText = `❌ 错误: ${error.message}`;
            if (error.message.includes('401')) errText = "🔑 API Key 无效，请重新设置。";
            if (error.message.includes('402')) errText = "💰 余额不足，请充值。";
            if (error.message.includes('fetch')) errText = "🌐 网络错误。";
            updateAssistantText(assistantMsgId, errText, true);
            messagesHistory.push({ role: 'user', content: userMessage });
            messagesHistory.push({ role: 'assistant', content: errText });
        }
    }

    // 发送新消息（流式）
    async function sendMessage(userText) {
        if (!currentApiKey) {
            apiModal.style.display = 'flex';
            return;
        }
        if (!userText.trim()) return;
        const userId = 'user_' + Date.now();
        addUserMessageToUI(userText, userId);
        userInput.value = '';
        // 占位 AI 消息
        const assistantId = 'assistant_' + Date.now();
        addAssistantPlaceholder(assistantId);
        const startTime = performance.now();
        await streamDeepSeek(userText, assistantId, startTime);
    }

    // 清空对话（保留欢迎语）
    function clearChat() {
        messagesHistory = [];
        chatArea.innerHTML = '';
        const welcomeDiv = document.createElement('div');
        welcomeDiv.classList.add('message', 'assistant-message');
        welcomeDiv.innerHTML = '<div class="bubble">🧹 对话已清空。继续向我提问吧～</div>';
        chatArea.appendChild(welcomeDiv);
    }

    // 编辑消息（简化：清空该条之后的对话，重新发送编辑后的内容）
    function editUserMessage(msgId) {
        const userMsgDiv = document.querySelector(`.user-message[data-id="${msgId}"]`);
        if (!userMsgDiv) return;
        const oldText = userMsgDiv.querySelector('.bubble').innerText;
        const newText = prompt("编辑消息内容:", oldText);
        if (!newText || newText.trim() === oldText) return;
        // 找到这条消息在 DOM 中的位置，删除它及之后的所有消息
        let removeNext = false;
        const allMessages = Array.from(chatArea.querySelectorAll('.message'));
        for (let msg of allMessages) {
            if (removeNext) msg.remove();
            else if (msg.getAttribute('data-id') === msgId) {
                msg.remove();
                removeNext = true;
            }
        }
        // 重建 history：保留该条用户消息之前的 history 条目
        // 简化：截断 messagesHistory 到该用户消息之前
        let historyIndex = -1;
        for (let i = 0; i < messagesHistory.length; i++) {
            if (messagesHistory[i].role === 'user' && messagesHistory[i].content === oldText) {
                historyIndex = i;
                break;
            }
        }
        if (historyIndex !== -1) {
            messagesHistory = messagesHistory.slice(0, historyIndex);
        } else {
            messagesHistory = [];
        }
        // 重新发送新编辑的内容
        const newUserId = 'user_' + Date.now();
        addUserMessageToUI(newText.trim(), newUserId);
        const assistantId = 'assistant_' + Date.now();
        addAssistantPlaceholder(assistantId);
        const startTime = performance.now();
        streamDeepSeek(newText.trim(), assistantId, startTime);
    }

    // 重新生成最后一条 AI 回复（由 regenerate 按钮触发）
    async function regenerateLastAssistant(assistantMsgId) {
        const assistantDiv = document.querySelector(`.assistant-message[data-id="${assistantMsgId}"]`);
        if (!assistantDiv) return;
        // 找到它前面的用户消息
        let prevUserDiv = assistantDiv.previousElementSibling;
        while (prevUserDiv && !prevUserDiv.classList.contains('user-message')) {
            prevUserDiv = prevUserDiv.previousElementSibling;
        }
        if (!prevUserDiv) return;
        const userMsgText = prevUserDiv.querySelector('.bubble').innerText;
        // 删除当前 AI 消息及之后的所有消息
        let removeNext = false;
        const allMsgs = Array.from(chatArea.querySelectorAll('.message'));
        for (let msg of allMsgs) {
            if (removeNext) msg.remove();
            else if (msg.getAttribute('data-id') === assistantMsgId) {
                msg.remove();
                removeNext = true;
            }
        }
        // 截断 messagesHistory：删除该 assistant 及之后的所有记录
        let cutIndex = -1;
        for (let i = 0; i < messagesHistory.length; i++) {
            if (messagesHistory[i].role === 'assistant' && messagesHistory[i].content === assistantDiv.querySelector('.bubble .stream-text')?.innerText) {
                cutIndex = i;
                break;
            }
        }
        if (cutIndex !== -1) messagesHistory = messagesHistory.slice(0, cutIndex);
        // 重新调用流式
        const newAssistantId = 'assistant_' + Date.now();
        addAssistantPlaceholder(newAssistantId);
        const startTime = performance.now();
        await streamDeepSeek(userMsgText, newAssistantId, startTime);
    }

    // 事件监听（委托方式处理编辑/重新生成）
    chatArea.addEventListener('click', (e) => {
        const btn = e.target.closest('.action-btn');
        if (!btn) return;
        if (btn.classList.contains('edit-btn')) {
            const msgId = btn.getAttribute('data-id');
            if (msgId) editUserMessage(msgId);
        } else if (btn.classList.contains('regenerate-btn')) {
            const msgId = btn.getAttribute('data-id');
            if (msgId) regenerateLastAssistant(msgId);
        }
    });

    // 抽屉菜单逻辑
    function closeDrawer() {
        drawer.classList.remove('open');
        drawerOverlay.classList.remove('show');
    }
    function openDrawer() {
        drawer.classList.add('open');
        drawerOverlay.classList.add('show');
    }
    menuBtn.addEventListener('click', openDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    drawerClearChat.addEventListener('click', () => { clearChat(); closeDrawer(); });
    drawerSettings.addEventListener('click', () => { closeDrawer(); apiModal.style.display = 'flex'; });
    drawerAbout.addEventListener('click', () => { alert("🌙 流式暗夜助手\n模型: deepseek-v4-flash\n支持流式输出、编辑重试、侧边菜单。"); closeDrawer(); });
    clearChatHeaderBtn.addEventListener('click', () => { if(confirm("清空所有对话？")) clearChat(); });

    // 发送消息
    sendBtn.addEventListener('click', () => {
        const text = userInput.value.trim();
        if (text) sendMessage(text);
    });
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
    saveKeyBtn.addEventListener('click', () => {
        saveApiKeyAndClose(apiKeyInput.value);
    });
    // 点击模态框背景关闭
    apiModal.addEventListener('click', (e) => {
        if (e.target === apiModal) apiModal.style.display = 'none';
    });

    loadStoredKey();
</script>
</body>
</html>
